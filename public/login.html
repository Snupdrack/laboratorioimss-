<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SynkData — Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: linear-gradient(135deg, #0a0e1a 0%, #0d1117 100%);
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .login-wrap {
      width: 100%;
      max-width: 420px;
    }

    .login-card {
      background: #0d1117;
      border: 0.5px solid #1e2d3d;
      border-radius: 16px;
      padding: 32px 28px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.35);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 24px;
      justify-content: center;
      font-size: 24px;
      font-weight: 700;
      color: #00d4ff;
      letter-spacing: -0.5px;
    }

    .brand-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #00d4ff;
    }

    .title {
      text-align: center;
      font-size: 22px;
      font-weight: 600;
      color: #e2e8f0;
      margin-bottom: 8px;
    }

    .subtitle {
      text-align: center;
      font-size: 13px;
      color: #64748b;
      margin-bottom: 26px;
      line-height: 1.5;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 14px;
    }

    .form-label {
      font-size: 12px;
      color: #94a3b8;
    }

    .form-input {
      width: 100%;
      background: #0a0e1a;
      border: 0.5px solid #1e2d3d;
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 14px;
      color: #e2e8f0;
      outline: none;
      transition: border-color .15s ease;
    }

    .form-input:focus {
      border-color: #00d4ff66;
    }

    .form-input::placeholder {
      color: #334155;
    }

    .btn {
      width: 100%;
      margin-top: 8px;
      padding: 12px 16px;
      border-radius: 10px;
      border: none;
      background: #00d4ff;
      color: #0a0e1a;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      transition: all .15s ease;
    }

    .btn:hover {
      background: #20dcff;
      transform: translateY(-1px);
    }

    .btn:active {
      transform: translateY(0);
    }

    .msg {
      display: none;
      margin-top: 14px;
      font-size: 13px;
      border-radius: 10px;
      padding: 10px 12px;
    }

    .msg.error {
      display: block;
      background: #1f0808;
      border: 0.5px solid #ef444444;
      color: #ef4444;
    }

    .msg.success {
      display: block;
      background: #001f2e;
      border: 0.5px solid #00d4ff44;
      color: #00d4ff;
    }

    .demo-box {
      margin-top: 18px;
      background: #0a0e1a;
      border: 0.5px solid #1e2d3d;
      border-radius: 12px;
      padding: 14px;
      font-size: 12px;
      color: #64748b;
      line-height: 1.6;
    }

    .demo-box strong {
      color: #94a3b8;
    }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <div class="brand">
        SynkData
        <div class="brand-dot"></div>
      </div>

      <div class="title">Acceso al sistema</div>
      <div class="subtitle">
        Inicia sesión para entrar al panel correspondiente según tu rol.
      </div>

      <div class="form-group">
        <label class="form-label">Usuario o correo</label>
        <input class="form-input" id="username" type="text" placeholder="admin o cliente" />
      </div>

      <div class="form-group">
        <label class="form-label">Contraseña</label>
        <input class="form-input" id="password" type="password" placeholder="••••••••" />
      </div>

      <button class="btn" onclick="login()">Iniciar sesión</button>

      <div id="msg" class="msg"></div>

      <div class="demo-box">
        <strong>Demo local:</strong><br>
        Admin → usuario: <strong>admin</strong> / contraseña: <strong>1234</strong><br>
        Cliente → usuario: <strong>cliente</strong> / contraseña: <strong>1234</strong>
      </div>
    </div>
  </div>

  <script>
    function mostrarMsg(tipo, texto) {
      const msg = document.getElementById("msg");
      msg.className = `msg ${tipo}`;
      msg.textContent = texto;
      msg.style.display = "block";
    }

    async function login() {
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!username || !password) {
        mostrarMsg("error", "Completa usuario y contraseña.");
        return;
      }

      try {
        const res = await fetch("/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password })
        });

        const data = await res.json();

        if (!res.ok) {
          mostrarMsg("error", data.error || "No se pudo iniciar sesión.");
          return;
        }

        localStorage.setItem("token", data.token);
        localStorage.setItem("role", data.role);
        localStorage.setItem("username", username);

        mostrarMsg("success", "Acceso correcto. Redirigiendo...");

        if (data.role === "admin") {
          window.location.href = "/admin.html";
        } else if (data.role === "cliente") {
          window.location.href = "/cliente.html";
        } else {
          mostrarMsg("error", "Rol no reconocido.");
        }

      } catch (err) {
        mostrarMsg("error", "Error de conexión con el servidor.");
      }
    }
  </script>
</body>
</html>
